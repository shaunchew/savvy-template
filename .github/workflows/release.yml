name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  verify-and-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Tag matches VERSION and plugin.json
        run: |
          tag="${GITHUB_REF_NAME#v}"
          v="$(tr -d '[:space:]' < VERSION)"
          pj="$(jq -r .version .claude-plugin/plugin.json)"
          [ "$tag" = "$v" ]  || { echo "tag v$tag != VERSION $v"; exit 1; }
          [ "$tag" = "$pj" ] || { echo "tag v$tag != plugin.json $pj"; exit 1; }

      - name: Full test suite must pass
        run: bash tests/run.sh

      - name: Generated artifacts must not drift
        run: |
          bash scripts/build-plugin.sh
          # the manifest 'generated' date line legitimately changes — compare the
          # manifests with that single line normalized out, then restore them so the
          # tree-wide checks below see only real drift
          for m in template/.claude/.savvy-manifest.json .claude-plugin/.savvy-manifest.json; do
            if ! diff <(git show "HEAD:$m" | sed '/"generated":/d') <(sed '/"generated":/d' "$m") >/dev/null; then
              echo "manifest content drifted (beyond the generated date): $m"; exit 1
            fi
            git checkout -- "$m"
          done
          if ! git diff --quiet; then
            echo "build-plugin.sh output differs from committed artifacts:"; git diff --stat; exit 1
          fi
          if [ -n "$(git status --porcelain)" ]; then
            echo "build produced uncommitted/untracked artifacts:"; git status --porcelain; exit 1
          fi

      - name: CHANGELOG has a section for this version
        run: |
          tag="${GITHUB_REF_NAME#v}"
          grep -q "^## \[$tag\]" CHANGELOG.md || { echo "CHANGELOG.md missing '## [$tag]' section"; exit 1; }

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${GITHUB_REF_NAME}"
          # release notes = the CHANGELOG section for this version
          awk -v ver="[${GITHUB_REF_NAME#v}]" '
            index($0, ver) && /^## / {on=1; next}
            (/^## / || /^\[[0-9]+\.[0-9]+\.[0-9]+\]:/) && on {exit}
            on {print}
          ' CHANGELOG.md > notes.md
          [ -s notes.md ] || { echo "extracted empty release notes for $tag"; exit 1; }
          gh release create "$tag" --title "$tag" --notes-file notes.md
